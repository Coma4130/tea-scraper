name: Tea Manual Scraper

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4  # v3からv4へ変更

      - name: Set up Python
        uses: actions/setup-python@v5  # v4からv5へ変更
        with:
          python-version: '3.10' # 使用しているバージョン
